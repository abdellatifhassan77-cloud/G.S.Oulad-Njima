<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Description of the page for SEO"> 
    <meta property="og:image" content="image_url_here">
    <meta property="og:title" content="Title of the page">
    <meta property="og:description" content="Description of the page for social sharing">
    <meta name="twitter:card" content="summary_large_image">
    <title>Updated Page Title</title>
</head>
<body>
    <header>
        <h1>Welcome to Our Website</h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="contact">
            <h2>Contact Us</h2>
            <form action="#" method="post" aria-label="Contact Form">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required placeholder="yourname@example.com">

                <label for="phone">Phone:</label>
                <input type="tel" id="phone" name="phone" required placeholder="e.g., +966 55 123 4567">

                <label for="message">Message:</label>
                <textarea id="message" name="message" required></textarea>

                <button type="submit">Submit</button>
            </form>
        </section>
    </main>

    <footer aria-label="Footer section">
        <h3>Follow Us</h3>
        <ul>
            <li><a href="https://twitter.com/example">Twitter</a></li>
            <li><a href="https://facebook.com/example">Facebook</a></li>
            <li><a href="https://instagram.com/example">Instagram</a></li>
        </ul>
    </footer>
</body>
</html>
